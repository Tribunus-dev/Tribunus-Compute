name: Tribunus
options:
  bundleIdPrefix: compute.tribunus
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  tribunus-server:
    type: tool
    platform: macOS
    sources:
      - path: compute-native/compute-core/src
        type: folder
      - path: mlx-rs-fork
        type: folder
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: compute.tribunus.server
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGN_ENTITLEMENTS: Tribunus.entitlements
      CODE_SIGN_STYLE: Automatic
    preBuildScripts:
      - name: Cargo Build
        script: '${SRCROOT}/scripts/xcode-build.sh'

schemes:
  tribunus-server:
    build:
      targets:
        tribunus-server: all
    run:
      config: Debug
      commandLineArguments:
        "--port 11434": true
        "--model-path /path/to/model": true
      environmentVariables:
        RUST_LOG: info
        TRIBUNUS_ADMIN_KEY: ""
      metalFrameCapture: enabled
      customWorkingDirectory: "$(SRCROOT)"
    test:
      config: Debug
    profile:
      config: Release
      customWorkingDirectory: "$(SRCROOT)"
      metalFrameCapture: enabled
    analyze:
      config: Debug
    archive:
      config: Release
